[default]
# Both binaries are thin process shims: `src/main.rs` delegates to
# `prodder::real_main()`, and `src/bin/launcher.rs` `Command::spawn`s
# `prodder` and (optionally) pipes its stdout into `vector` for the
# Datadog sidecar. Neither is exercisable from `cargo test` without
# mocking process spawning; all meaningful logic lives in `src/lib.rs`
# and `src/drafter.rs`.
exclude-files = ["src/main.rs", "src/bin/launcher.rs"]
