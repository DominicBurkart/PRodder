[package]
name = "prodder"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.96"
reqwest = { version = "0.12", features = ["blocking"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }

[dev-dependencies]
cargo-husky = { version = "1", default-features = false, features = ["user-hooks"] }
