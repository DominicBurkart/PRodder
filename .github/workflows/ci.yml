name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W clippy::cargo
      - run: cargo deny check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - run: cargo test --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    environment: codecov
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --all-features --ignore-filename-regex 'src/(main|bin/launcher)\.rs' --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
          - target: wasm32-unknown-unknown
            runner: ubuntu-latest
            use_cross: false
            continue_on_error: true
    continue-on-error: ${{ matrix.continue_on_error == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        if: matrix.use_cross
        with:
          tool: cross
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }}
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --target ${{ matrix.target }}

  container:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: prodder:ci

  pre-commit-ci:
    name: Pre-commit (fix mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - run: cargo fmt
      - run: cargo clippy --fix --allow-staged --allow-dirty --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W clippy::cargo
      - name: Fail if fixes were needed
        run: |
          if ! git diff --quiet; then
            echo "Pre-commit hooks would modify files. Run cargo fmt and cargo clippy --fix locally."
            git diff
            exit 1
          fi

  all-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, build, container, pre-commit-ci]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [name for name, data in needs.items() if data['result'] not in ('success', 'skipped')]
          if failed:
              print('Failed jobs:', failed)
              sys.exit(1)
          print('All jobs passed')
          "
